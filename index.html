<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🛒 Lista de Compras</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f3f4f6;
      --text-primary: #000000;
      --text-secondary: #6b7280;
      --border-color: #e5e7eb;
    }
    [data-theme="dark"] {
      --bg-primary: #1a1a1a;
      --bg-secondary: #2d2d2d;
      --text-primary: #ffffff;
      --text-secondary: #9ca3af;
      --border-color: #404040;
    }
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      -webkit-tap-highlight-color: transparent;
      transition: background-color 0.2s, color 0.2s;
    }
    .item-checked {
      opacity: 0.5;
      text-decoration: line-through;
    }
    .item-row {
      transition: all 0.2s ease;
      background: var(--bg-secondary);
    }
    .item-row:active {
      transform: scale(0.98);
    }
    .main-button {
      background: var(--tg-theme-button-color, #3390ec);
      color: var(--tg-theme-button-text-color, #ffffff);
    }
    .delete-btn {
      background: var(--tg-theme-hint-color, #999999);
    }
    .input-field {
      background: var(--bg-primary);
      color: var(--text-primary);
      border-color: var(--border-color);
    }
    .input-field::placeholder {
      color: var(--text-secondary);
    }
  </style>
</head>
<body class="min-h-screen p-4 pb-20">
  <!-- Header -->
  <div class="flex items-center justify-between mb-3">
    <h1 class="text-xl font-bold">🛒 Lista de Compras</h1>
    <div class="flex gap-2">
      <button onclick="toggleTheme()" class="px-3 py-1.5 rounded-md text-xs font-medium" style="background: var(--border-color); color: var(--text-primary);">
        <span id="themeIcon">🌙</span>
      </button>
      <button onclick="clearAll()" class="delete-btn text-white px-3 py-1.5 rounded-md text-xs font-medium">
        Limpiar
      </button>
    </div>
  </div>

  <!-- Input -->
  <div class="flex gap-2 mb-3">
    <input 
      type="text" 
      id="itemInput" 
      placeholder="Agregar item..."
      class="input-field flex-1 px-3 py-2 rounded-lg border focus:border-blue-500 focus:outline-none text-sm"
      onkeypress="handleKeyPress(event)"
    />
    <button 
      onclick="addItem()" 
      class="main-button px-4 py-2 rounded-lg font-bold text-base"
    >
      +
    </button>
  </div>

  <!-- Stats -->
  <div class="flex gap-3 mb-2 text-xs" style="color: var(--text-secondary);">
    <span id="totalCount">0 items</span>
    <span id="checkedCount">0 comprados</span>
  </div>

  <!-- List -->
  <div id="shoppingList" class="space-y-1">
    <!-- Items se agregan aquí -->
  </div>

  <!-- Empty State -->
  <div id="emptyState" class="text-center py-8" style="color: var(--text-secondary);">
    <div class="text-4xl mb-2">🛒</div>
    <p class="text-sm">Tu lista está vacía</p>
  </div>

  <script>
    // Inicializar Telegram Web App
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // Tema - cargar preferencia guardada o usar sistema
    function initTheme() {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = saved || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
      updateThemeIcon();
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      updateThemeIcon();
      tg.HapticFeedback.impactOccurred('light');
    }

    function updateThemeIcon() {
      const theme = document.documentElement.getAttribute('data-theme');
      document.getElementById('themeIcon').textContent = theme === 'dark' ? '☀️' : '🌙';
    }

    // Inicializar tema
    initTheme();

    // Estado - cargar desde localStorage o usar lista inicial de Google Keep
    const defaultItems = [
      { text: 'Poleras blancas', checked: false },
      { text: 'Calcetines', checked: false },
      { text: 'Boxers', checked: false },
      { text: 'Licuadora para hacer batidos', checked: false },
      { text: 'Casco de bicicleta', checked: false }
    ];
    let items = JSON.parse(localStorage.getItem('shoppingList')) || defaultItems;

    // Guardar en localStorage
    function save() {
      localStorage.setItem('shoppingList', JSON.stringify(items));
      render();
    }

    // Renderizar lista
    function render() {
      const list = document.getElementById('shoppingList');
      const empty = document.getElementById('emptyState');
      const total = document.getElementById('totalCount');
      const checked = document.getElementById('checkedCount');

      if (items.length === 0) {
        list.innerHTML = '';
        empty.style.display = 'block';
        total.textContent = '0 items';
        checked.textContent = '0 comprados';
        return;
      }

      empty.style.display = 'none';
      
      const checkedCount = items.filter(i => i.checked).length;
      total.textContent = `${items.length} item${items.length !== 1 ? 's' : ''}`;
      checked.textContent = `${checkedCount} comprad${checkedCount !== 1 ? 'os' : 'o'}`;

      list.innerHTML = items.map((item, index) => `
        <div class="item-row flex items-center gap-2 p-2 bg-gray-50 rounded-lg ${item.checked ? 'item-checked' : ''}">
          <button 
            onclick="toggleItem(${index})"
            class="w-5 h-5 rounded-full border-2 flex items-center justify-center flex-shrink-0 transition-colors text-sm"
            style="border-color: var(--tg-theme-button-color, #3390ec)"
          >
            ${item.checked ? '✓' : ''}
          </button>
          <span class="flex-1 text-sm font-medium truncate">${escapeHtml(item.text)}</span>
          <button 
            onclick="deleteItem(${index})"
            class="delete-btn text-white w-6 h-6 rounded flex items-center justify-center flex-shrink-0 text-xs"
          >
            ✕
          </button>
        </div>
      `).join('');
    }

    // Agregar item
    function addItem() {
      const input = document.getElementById('itemInput');
      const text = input.value.trim();
      
      if (!text) return;

      items.unshift({ text, checked: false });
      input.value = '';
      save();
      
      // Haptic feedback
      tg.HapticFeedback.impactOccurred('light');
    }

    // Toggle item
    function toggleItem(index) {
      items[index].checked = !items[index].checked;
      
      // Mover items comprados al final
      const item = items.splice(index, 1)[0];
      items.push(item);
      
      save();
      tg.HapticFeedback.impactOccurred('light');
    }

    // Delete item
    function deleteItem(index) {
      items.splice(index, 1);
      save();
      tg.HapticFeedback.impactOccurred('medium');
    }

    // Clear all
    function clearAll() {
      if (items.length === 0) return;
      
      tg.showConfirm('¿Borrar toda la lista?', (confirmed) => {
        if (confirmed) {
          items = [];
          save();
          tg.HapticFeedback.notificationOccurred('success');
        }
      });
    }

    // Handle Enter key
    function handleKeyPress(event) {
      if (event.key === 'Enter') {
        addItem();
      }
    }

    // Escape HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Configurar Main Button de Telegram
    tg.MainButton.setText('COMPARTIR LISTA');
    tg.MainButton.onClick(() => {
      const unchecked = items.filter(i => !i.checked).map(i => `• ${i.text}`).join('\n');
      if (unchecked) {
        tg.sendData(`🛒 Mi lista de compras:\n\n${unchecked}`);
      } else {
        tg.showAlert('¡Lista completa! Todos los items están comprados.');
      }
    });

    // Mostrar Main Button solo si hay items
    function updateMainButton() {
      const unchecked = items.filter(i => !i.checked).length;
      if (unchecked > 0) {
        tg.MainButton.show();
        tg.MainButton.setText(`COMPARTIR LISTA (${unchecked})`);
      } else {
        tg.MainButton.hide();
      }
    }

    // Override save para actualizar Main Button
    const originalSave = save;
    save = function() {
      originalSave();
      updateMainButton();
    };

    // Render inicial
    render();
    updateMainButton();
  </script>
</body>
</html>
