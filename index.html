<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🛒 Lista de Compras</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f3f4f6;
      --text-primary: #000000;
      --text-secondary: #6b7280;
      --border-color: #e5e7eb;
      --item-bg: #f9fafb;
      --item-text: #1f2937;
    }
    [data-theme="dark"] {
      --bg-primary: #000000;
      --bg-secondary: #1c1c1c;
      --text-primary: #ffffff;
      --text-secondary: #a0a0a0;
      --border-color: #333333;
      --item-bg: #1c1c1c;
      --item-text: #ffffff;
    }
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      -webkit-tap-highlight-color: transparent;
      transition: background-color 0.2s, color 0.2s;
    }
    .item-checked {
      opacity: 0.5;
      text-decoration: line-through;
    }
    .item-row {
      transition: all 0.2s ease;
    }
    .item-row:active {
      transform: scale(0.98);
    }
    .drag-handle {
      user-select: none;
      -webkit-user-select: none;
    }
    .draggable-item.dragging {
      opacity: 0.5;
      background: var(--border-color);
    }
    .main-button {
      background: var(--tg-theme-button-color, #3390ec);
      color: var(--tg-theme-button-text-color, #ffffff);
    }
    .delete-btn {
      background: var(--tg-theme-hint-color, #999999);
    }
    .input-field {
      background: var(--bg-secondary);
      color: var(--text-primary);
      border-color: var(--border-color);
    }
    .input-field::placeholder {
      color: var(--text-secondary);
    }
  </style>
</head>
<body class="min-h-screen p-4 pb-20">
  <!-- Header -->
  <div class="flex items-center justify-between mb-3">
    <h1 class="text-xl font-bold">🛒 Lista de Compras</h1>
    <div class="flex gap-2">
      <button onclick="toggleTheme()" class="px-3 py-1.5 rounded-md text-xs font-medium" style="background: var(--border-color); color: var(--text-primary);">
        <span id="themeIcon">🌙</span>
      </button>
      <button onclick="clearAll()" class="delete-btn text-white px-3 py-1.5 rounded-md text-xs font-medium">
        Limpiar
      </button>
    </div>
  </div>

  <!-- Input -->
  <div class="flex gap-2 mb-3">
    <input 
      type="text" 
      id="itemInput" 
      placeholder="Agregar item..."
      class="input-field flex-1 px-3 py-2 rounded-lg border focus:border-blue-500 focus:outline-none text-sm"
      onkeypress="handleKeyPress(event)"
    />
    <button 
      onclick="addItem()" 
      class="main-button px-4 py-2 rounded-lg font-bold text-base"
    >
      +
    </button>
  </div>

  <!-- Stats -->
  <div class="flex gap-3 mb-2 text-xs" style="color: var(--text-secondary);" data-stats>
    <span id="totalCount">0 items</span>
    <span id="checkedCount">0 comprados</span>
  </div>

  <!-- List -->
  <div id="shoppingList" class="space-y-1">
    <!-- Items se agregan aquí -->
  </div>

  <!-- Empty State -->
  <div id="emptyState" class="text-center py-8" style="color: var(--text-secondary);">
    <div class="text-4xl mb-2">🛒</div>
    <p class="text-sm">Tu lista está vacía</p>
  </div>

  <script>
    // Inicializar Telegram Web App
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // Tema - cargar preferencia guardada o usar sistema
    function initTheme() {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = saved || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
      updateThemeIcon();
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      updateThemeIcon();
      tg.HapticFeedback.impactOccurred('light');
    }

    function updateThemeIcon() {
      const theme = document.documentElement.getAttribute('data-theme');
      document.getElementById('themeIcon').textContent = theme === 'dark' ? '☀️' : '🌙';
    }

    // Inicializar tema
    initTheme();

    // Estado - cargar desde localStorage o usar lista inicial de Google Keep
    const defaultItems = [
      { text: 'Poleras blancas', checked: false, priority: false },
      { text: 'Calcetines', checked: false, priority: false },
      { text: 'Boxers', checked: false, priority: false },
      { text: 'Licuadora para hacer batidos', checked: false, priority: false },
      { text: 'Casco de bicicleta', checked: false, priority: false }
    ];
    let items = JSON.parse(localStorage.getItem('shoppingList')) || defaultItems;

    // Guardar en localStorage
    function save() {
      localStorage.setItem('shoppingList', JSON.stringify(items));
      render();
    }

    // Renderizar lista
    function render() {
      const list = document.getElementById('shoppingList');
      const empty = document.getElementById('emptyState');
      const total = document.getElementById('totalCount');
      const checked = document.getElementById('checkedCount');

      if (items.length === 0) {
        list.innerHTML = '';
        empty.style.display = 'block';
        total.textContent = '0 items';
        checked.textContent = '0 comprados';
        return;
      }

      empty.style.display = 'none';
      
      const checkedCount = items.filter(i => i.checked).length;
      total.textContent = `${items.length} item${items.length !== 1 ? 's' : ''}`;
      checked.textContent = `${checkedCount} comprad${checkedCount !== 1 ? 'os' : 'o'}`;

      // Ordenar: prioritarios primero (solo visuales, array original se mantiene)
      const sortedIndices = items.map((_, i) => i).sort((a, b) => {
        // Items comprados siempre al final
        if (items[a].checked && !items[b].checked) return 1;
        if (!items[a].checked && items[b].checked) return -1;
        // Prioritarios primero
        if (items[a].priority && !items[b].priority) return -1;
        if (!items[a].priority && items[b].priority) return 1;
        return 0;
      });

      list.innerHTML = sortedIndices.map((realIndex) => {
        const item = items[realIndex];
        return `
          <div 
            class="item-row flex items-center gap-1 p-2 rounded-lg ${item.checked ? 'item-checked' : ''} ${item.priority ? 'priority-item' : ''} draggable-item"
            style="background: var(--item-bg); color: var(--item-text); ${item.priority ? 'border: 2px solid #f59e0b' : ''}"
            draggable="true"
            data-index="${realIndex}"
          >
            <span class="drag-handle text-lg cursor-grab active:cursor-grabbing select-none" style="color: var(--text-secondary);">⋮⋮</span>
            <button 
              onclick="togglePriority(${realIndex})"
              class="w-6 h-6 rounded flex items-center justify-center flex-shrink-0 transition-colors text-base"
              style="background: transparent;"
            >
              ${item.priority ? '⭐' : '☆'}
            </button>
            <button 
              onclick="toggleItem(${realIndex})"
              class="w-5 h-5 rounded-full border-2 flex items-center justify-center flex-shrink-0 transition-colors text-sm"
              style="border-color: var(--tg-theme-button-color, #3390ec); color: var(--item-text);"
            >
              ${item.checked ? '✓' : ''}
            </button>
            <span class="flex-1 text-sm font-medium truncate">${escapeHtml(item.text)}</span>
            <button 
              onclick="deleteItem(${realIndex})"
              class="delete-btn text-white w-6 h-6 rounded flex items-center justify-center flex-shrink-0 text-xs"
            >
              ✕
            </button>
          </div>
        `;
      }).join('');

      // Setup drag and drop after render
      setupDragAndDrop();
    }

    // Agregar item
    function addItem() {
      const input = document.getElementById('itemInput');
      const text = input.value.trim();
      
      if (!text) return;

      items.unshift({ text, checked: false });
      input.value = '';
      save();
      
      // Haptic feedback
      tg.HapticFeedback.impactOccurred('light');
    }

    // Setup drag and drop
    let draggedIndex = null;

    function setupDragAndDrop() {
      const dragItems = document.querySelectorAll('.draggable-item');
      
      dragItems.forEach((item, index) => {
        item.addEventListener('dragstart', (e) => {
          draggedIndex = index;
          item.style.opacity = '0.5';
          e.dataTransfer.effectAllowed = 'move';
        });

        item.addEventListener('dragend', () => {
          item.style.opacity = '1';
          draggedIndex = null;
        });

        item.addEventListener('dragover', (e) => {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
        });

        item.addEventListener('drop', (e) => {
          e.preventDefault();
          const droppedIndex = index;
          
          if (draggedIndex !== null && draggedIndex !== droppedIndex) {
            // Mover item
            const draggedItem = items[draggedIndex];
            items.splice(draggedIndex, 1);
            items.splice(droppedIndex, 0, draggedItem);
            save();
            tg.HapticFeedback.impactOccurred('light');
          }
        });

        // Touch support para móvil
        item.addEventListener('touchstart', handleTouchStart, { passive: false });
        item.addEventListener('touchmove', handleTouchMove, { passive: false });
        item.addEventListener('touchend', handleTouchEnd);
      });
    }

    // Touch handlers para drag en móvil
    let touchDragIndex = null;
    let touchStartY = 0;

    function handleTouchStart(e) {
      const handle = e.target.closest('.drag-handle');
      if (!handle) return;
      
      touchDragIndex = parseInt(e.currentTarget.dataset.index);
      touchStartY = e.touches[0].clientY;
      e.currentTarget.style.opacity = '0.5';
      e.currentTarget.style.transform = 'scale(1.02)';
    }

    function handleTouchMove(e) {
      if (touchDragIndex === null) return;
      e.preventDefault();
    }

    function handleTouchEnd(e) {
      if (touchDragIndex === null) return;
      
      const touchEndY = e.changedTouches[0].clientY;
      const diff = touchEndY - touchStartY;
      const itemHeight = 50; // aproximado
      
      if (Math.abs(diff) > itemHeight / 2) {
        const direction = diff > 0 ? 1 : -1;
        const newIndex = touchDragIndex + direction;
        
        if (newIndex >= 0 && newIndex < items.length) {
          const draggedItem = items[touchDragIndex];
          items.splice(touchDragIndex, 1);
          items.splice(newIndex, 0, draggedItem);
          save();
          tg.HapticFeedback.impactOccurred('light');
        }
      }
      
      // Reset styles
      const items = document.querySelectorAll('.draggable-item');
      items.forEach(item => {
        item.style.opacity = '1';
        item.style.transform = '';
      });
      
      touchDragIndex = null;
    }

    // Toggle prioridad
    function togglePriority(index) {
      items[index].priority = !items[index].priority;
      save();
      tg.HapticFeedback.impactOccurred('light');
    }

    // Toggle item
    function toggleItem(index) {
      items[index].checked = !items[index].checked;
      
      // Mover items comprados al final
      const item = items.splice(index, 1)[0];
      items.push(item);
      
      save();
      tg.HapticFeedback.impactOccurred('light');
    }

    // Delete item
    function deleteItem(index) {
      items.splice(index, 1);
      save();
      tg.HapticFeedback.impactOccurred('medium');
    }

    // Clear all
    function clearAll() {
      if (items.length === 0) return;
      
      tg.showConfirm('¿Borrar toda la lista?', (confirmed) => {
        if (confirmed) {
          items = [];
          save();
          tg.HapticFeedback.notificationOccurred('success');
        }
      });
    }

    // Handle Enter key
    function handleKeyPress(event) {
      if (event.key === 'Enter') {
        addItem();
      }
    }

    // Escape HTML
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Configurar Main Button de Telegram
    tg.MainButton.setText('COMPARTIR LISTA');
    tg.MainButton.onClick(() => {
      const unchecked = items.filter(i => !i.checked).map(i => `• ${i.text}`).join('\n');
      if (unchecked) {
        tg.sendData(`🛒 Mi lista de compras:\n\n${unchecked}`);
      } else {
        tg.showAlert('¡Lista completa! Todos los items están comprados.');
      }
    });

    // Mostrar Main Button solo si hay items
    function updateMainButton() {
      const unchecked = items.filter(i => !i.checked).length;
      if (unchecked > 0) {
        tg.MainButton.show();
        tg.MainButton.setText(`COMPARTIR LISTA (${unchecked})`);
      } else {
        tg.MainButton.hide();
      }
    }

    // Override save para actualizar Main Button
    const originalSave = save;
    save = function() {
      originalSave();
      updateMainButton();
    };

    // Render inicial
    render();
    updateMainButton();
  </script>
</body>
</html>
